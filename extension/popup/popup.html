/**
 * Popup HTML
 * Extension popup that integrates with the main Vite app
 */

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureFill AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f9fafb;
    }

    body {
      overflow: hidden;
    }

    #securefill-popup {
      width: 100%;
      height: 100%;
      overflow-y: auto;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 14px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="securefill-popup">
    <div id="securefill-ui">
      <h1 style="font-size:18px;margin:16px 12px;color:#111827">SecureFill AI</h1>
      <div style="padding:0 12px 12px 12px;">
        <label style="display:block;margin-bottom:6px;color:#374151;font-size:13px">Full name</label>
        <input id="sf-fullName" type="text" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:8px" />

        <label style="display:block;margin-bottom:6px;color:#374151;font-size:13px">Email</label>
        <input id="sf-email" type="email" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:8px" />

        <label style="display:block;margin-bottom:6px;color:#374151;font-size:13px">Phone</label>
        <input id="sf-phone" type="tel" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:12px" />

        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
          <input id="sf-autofillOnLoad" type="checkbox" />
          <label for="sf-autofillOnLoad" style="color:#374151;font-size:13px">Autofill on page load (opt-in)</label>
        </div>

        <div style="display:flex;gap:8px;">
          <button id="sf-save" style="flex:1;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white">Save Profile</button>
          <button id="sf-autofillNow" style="flex:1;padding:10px;border-radius:8px;border:1px solid #e5e7eb;background:white;color:#374151">Autofill Page</button>
        </div>

        <div style="display:flex;gap:8px;margin-top:10px;">
          <button id="sf-clear" style="flex:1;padding:8px;border-radius:8px;border:1px dashed #e5e7eb;background:white;color:#374151">Clear Data</button>
          <button id="sf-blockDomain" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e5e7eb;background:white;color:#374151">Block Domain</button>
        </div>
        <div id="sf-status" style="margin-top:12px;color:#6b7280;font-size:13px"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
