<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureFill AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 450px;
      min-height: 700px;
      max-height: 800px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
    }

    body {
      overflow: hidden;
    }

    #securefill-popup {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #374151;
      font-size: 12px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    input[type="date"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="checkbox"] {
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .btn-secondary:hover {
      background: #f3f4f6;
    }

    .btn-danger {
      background: white;
      color: #dc2626;
      border: 1px dashed #fca5a5;
    }

    .btn-danger:hover {
      background: #fef2f2;
    }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .status.success {
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status.info {
      background: #dbeafe;
      color: #1e40af;
    }

    .footer {
      padding: 12px 16px;
      background: #f3f4f6;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
  <script type="module" crossorigin src="/popup.js"></script>
  <link rel="modulepreload" crossorigin href="/storage.js">
</head>
<body>
  <div id="securefill-popup">
    <div class="header">
      <h1>✓ SecureFill AI</h1>
    </div>

    <div class="content">
      <!-- Personal Information -->
      <h3 style="color:#111827;font-size:14px;margin-bottom:8px;margin-top:8px">Personal Information</h3>
      
      <div class="form-group">
        <label>Full Name</label>
        <input id="sf-fullName" type="text" placeholder="John Alexander Smith" />
      </div>

      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input id="sf-firstName" type="text" placeholder="John" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input id="sf-lastName" type="text" placeholder="Smith" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="sf-email" type="email" placeholder="john.smith@example.com" />
      </div>

      <div class="row">
        <div class="form-group">
          <label>Phone</label>
          <input id="sf-phone" type="tel" placeholder="+1-555-123-4567" />
        </div>
        <div class="form-group">
          <label>Age</label>
          <input id="sf-age" type="number" placeholder="28" />
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Gender</label>
          <select id="sf-gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input id="sf-dateOfBirth" type="date" />
        </div>
      </div>

      <!-- Address Information -->
      <h3 style="color:#111827;font-size:14px;margin-bottom:8px;margin-top:12px">Address</h3>
      
      <div class="form-group">
        <label>Street Address</label>
        <input id="sf-address" type="text" placeholder="123 Main Street, Apt 4B" />
      </div>

      <div class="row">
        <div class="form-group">
          <label>City</label>
          <input id="sf-city" type="text" placeholder="New York" />
        </div>
        <div class="form-group">
          <label>State</label>
          <input id="sf-state" type="text" placeholder="NY" />
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Country</label>
          <input id="sf-country" type="text" placeholder="United States" />
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input id="sf-pincode" type="text" placeholder="10001" />
        </div>
      </div>

      <!-- Identification -->
      <h3 style="color:#111827;font-size:14px;margin-bottom:8px;margin-top:12px">Identification</h3>
      
      <div class="row">
        <div class="form-group">
          <label>ID / Student ID</label>
          <input id="sf-id" type="text" placeholder="STU-2024-00156" />
        </div>
        <div class="form-group">
          <label>Enrollment Number</label>
          <input id="sf-enrollmentNumber" type="text" placeholder="EN-2024-0156" />
        </div>
      </div>

      <!-- Professional -->
      <h3 style="color:#111827;font-size:14px;margin-bottom:8px;margin-top:12px">Professional</h3>
      
      <div class="form-group">
        <label>LinkedIn</label>
        <input id="sf-linkedin" type="text" placeholder="https://linkedin.com/in/johnsmith" />
      </div>

      <div class="form-group">
        <label>GitHub</label>
        <input id="sf-github" type="text" placeholder="https://github.com/johnsmith" />
      </div>

      <!-- Options -->
      <h3 style="color:#111827;font-size:14px;margin-bottom:8px;margin-top:12px">Options</h3>
      
      <div class="checkbox-group">
        <input id="sf-autofillOnLoad" type="checkbox" />
        <label for="sf-autofillOnLoad">Autofill on page load</label>
      </div>
    </div>

    <div style="padding:12px 16px;border-top:1px solid #e5e7eb">
      <div class="buttons" style="margin-bottom:8px">
        <button id="sf-save" class="btn btn-primary">Save Profile</button>
        <button id="sf-autofillNow" class="btn btn-secondary">Fill Now</button>
      </div>
      <div class="buttons">
        <button id="sf-clear" class="btn btn-danger">Clear Data</button>
        <button id="sf-blockDomain" class="btn btn-secondary">Block Domain</button>
      </div>
      <div id="sf-status" class="status" style="display:none;"></div>
    </div>

    <div class="footer">
      Pre-filled with demo data. Save to store your real data.
    </div>
  </div>

</body>
</html>
